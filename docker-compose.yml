services:
  ann-service:
    build: .
    platform: linux/amd64
    command: [ "./ann-service" ]
    environment:
      - ANN_PORT=8090
      - IVF_DATA_PATH=/root/ivf_data
    cpus: '0.3'
    mem_limit: 160M
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8090/ready" ]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  api01:
    build: .
    command: [ "./server" ]
    platform: linux/amd64
    environment:
      - PORT=8080
      - ANN_SERVICE_URL=http://ann-service:8090
    ports:
      - "8080:8080"
      - "6060:6060"
    cpus: '0.25'
    mem_limit: 80M
    depends_on:
      ann-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/ready" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  api02:
    build: .
    platform: linux/amd64
    command: [ "./server" ]
    environment:
      - PORT=8081
      - ANN_SERVICE_URL=http://ann-service:8090
    ports:
      - "8081:8081"
      - "6061:6060"
    cpus: '0.25'
    mem_limit: 80M
    depends_on:
      ann-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8081/ready" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  nginx:
    image: nginx:alpine
    platform: linux/amd64
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api01
      - api02
    ports:
      - "9999:9999"
    cpus: '0.2'
    mem_limit: 30M
  k6:
    image: grafana/k6
    environment:
      K6_WEB_DASHBOARD: "true"
    ports:
      - "5665:5665"
    volumes:
      - ./k6:/scripts
    command: run /scripts/test.js
    depends_on:
      - nginx

networks:
  default:
    driver: bridge
