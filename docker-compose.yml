version: '3.8'

services:
  api01:
    build: .
    platform: linux/amd64
    environment:
      - PORT=8080
    cpus: '0.3'
    mem_limit: 100M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/ready"]
      interval: 5s
      timeout: 3s
      retries: 3

  api02:
    build: .
    platform: linux/amd64
    environment:
      - PORT=8080
    cpus: '0.3'
    mem_limit: 100M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/ready"]
      interval: 5s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:alpine
    platform: linux/amd64
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api01
      - api02
    ports:
      - "9999:9999"
    cpus: '0.4'
    mem_limit: 150M

networks:
  default:
    driver: bridge
