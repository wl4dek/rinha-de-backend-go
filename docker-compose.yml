services:
  ann-service:
    build: .
    platform: linux/amd64
    command: [ "./ann-service" ]
    environment:
      - ANN_PORT=8090
      - REFERENCES_PATH=/app/references.json.gz
      - INDEX_BIN_PATH=/app/index.bin
    volumes:
      - ./references.json.gz:/app/references.json.gz:ro
      - ./index.bin:/app/index.bin:ro
    cpus: '0.3'
    mem_limit: 120M
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8090/ready" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 2m

  api01:
    build: .
    platform: linux/amd64
    environment:
      - PORT=8080
      - ANN_SERVICE_URL=http://ann-service:8090
    cpus: '0.25'
    mem_limit: 80M
    depends_on:
      ann-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/ready" ]
      interval: 5s
      timeout: 3s
      retries: 3

  api02:
    build: .
    platform: linux/amd64
    environment:
      - PORT=8080
      - ANN_SERVICE_URL=http://ann-service:8090
    cpus: '0.25'
    mem_limit: 80M
    depends_on:
      ann-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/ready" ]
      interval: 5s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:alpine
    platform: linux/amd64
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api01
      - api02
    ports:
      - "9999:9999"
    cpus: '0.2'
    mem_limit: 70M

networks:
  default:
    driver: bridge
