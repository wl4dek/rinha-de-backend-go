services:
  ann-service:
    image: wl4dek/rinha-de-backend-go:latest
    platform: linux/amd64
    command: [ "./ann-service" ]
    environment:
      - ANN_PORT=8090
      - IVF_DATA_PATH=/root/ivf_data
      - GOMEMLIMIT=90MiB
      - GOGC=200
    cpus: '0.4'
    mem_limit: 100M
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8090/ready" ]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  api01: &api01
    image: wl4dek/rinha-de-backend-go:latest
    command: [ "./server" ]
    platform: linux/amd64
    environment:
      - PORT=8080
      - ANN_SERVICE_URL=http://ann-service:8090
      - GOMEMLIMIT=54MiB
      - GOGC=200
    ports:
      - "8080:8080"
      - "6060:6060"
    cpus: '0.2'
    mem_limit: 60M
    depends_on:
      ann-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/ready" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  api02:
    <<: *api01
    environment:
      - PORT=8081
      - ANN_SERVICE_URL=http://ann-service:8090
      - GOMEMLIMIT=54MiB
      - GOGC=200
    ports:
      - "8081:8081"
      - "6061:6060"
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8081/ready" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  lb:
    image: wl4dek/rinha-de-backend-go:latest
    platform: linux/amd64
    command: [ './lb' ]
    environment:
      - GOMEMLIMIT=117MiB
      - GOGC=200
    depends_on:
      - api01
      - api02
    ports:
      - "9999:9999"
    cpus: '0.2'
    mem_limit: 130M
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:9999/health" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

networks:
  default:
    driver: bridge
